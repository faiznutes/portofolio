services:
  portofolio-web:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - portofolio-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portofolio-frontend.rule=Host(`faiznute.site`) || Host(`www.faiznute.site`)"
      - "traefik.http.routers.portofolio-frontend.entrypoints=http,https"
      - "traefik.http.routers.portofolio-frontend.tls=true"
      - "traefik.http.services.portofolio-frontend.loadbalancer.server.port=80"

  portofolio-api:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.faiznute.site
      APP_LOCALE: id
      APP_FALLBACK_LOCALE: id
      FRONTEND_URL: https://faiznute.site
      CORS_ALLOWED_ORIGINS: https://faiznute.site,https://www.faiznute.site
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portofolio-api.rule=Host(`api.faiznute.site`)"
      - "traefik.http.routers.portofolio-api.entrypoints=http,https"
      - "traefik.http.routers.portofolio-api.tls=true"
      - "traefik.http.services.portofolio-api.loadbalancer.server.port=8000"
