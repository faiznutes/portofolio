  <body data-page="contact" class="bg-bg-light font-display text-slate-900">
    <noscript>

    <div id="app-header"></div>
    <main class="px-6 py-14 lg:px-10">
      <div class="mx-auto grid max-w-7xl grid-cols-1 gap-12 lg:grid-cols-2">
        <section class="rounded-2xl border border-slate-200 bg-white p-8">
          <h1 class="text-3xl font-black">Hubungi Saya</h1>
            <p class="mt-2 text-slate-600">Kirim brief project Anda, saya akan merespons maksimal dalam 1x24 jam kerja dengan arahan awal yang jelas.</p>
          <form class="mt-7 space-y-4" data-contact-form>
            <div class="space-y-1">
              <input class="w-full rounded-lg border-slate-300" placeholder="Nama lengkap" type="text" name="name" autocomplete="name" />
              <p class="text-xs text-red-600" data-error="name"></p>
            </div>
            <div class="space-y-1">
              <input class="w-full rounded-lg border-slate-300" placeholder="Email" type="email" name="email" autocomplete="email" />
              <p class="text-xs text-red-600" data-error="email"></p>
            </div>
            <div class="space-y-1">
              <input class="w-full rounded-lg border-slate-300" placeholder="No. WhatsApp" type="text" name="phone" autocomplete="tel" />
              <p class="text-xs text-red-600" data-error="phone"></p>
            </div>
            <div class="space-y-1">
              <textarea class="min-h-[140px] w-full rounded-lg border-slate-300" placeholder="Ceritakan kebutuhan project" name="message"></textarea>
              <p class="text-xs text-red-600" data-error="message"></p>
            </div>
            <p class="text-xs text-slate-500" data-form-notice>Data Anda hanya digunakan untuk proses konsultasi project.</p>
            <button class="w-full rounded-lg bg-primary py-3.5 font-bold text-white" type="submit">Kirim Pesan</button>
          </form>
        </section>
        <section class="space-y-6">
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white"><img src="assets/images/banner-contact.webp?v=20260304b" alt="Diskusi project" class="aspect-[3/1] w-full object-cover" /></div>
