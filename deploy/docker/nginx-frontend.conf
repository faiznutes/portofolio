server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    charset utf-8;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    if ($host = www.faiznute.site) {
        return 301 https://faiznute.site$request_uri;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://faiznute.site https://www.faiznute.site; upgrade-insecure-requests" always;

    location /api/ {
        proxy_pass http://portofolio-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sanctum/ {
        proxy_pass http://portofolio-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /works.html {
        return 301 /works;
    }

    location = /services.html {
        return 301 /services;
    }

    location = /cv.html {
        return 301 /cv;
    }

    location = /contact.html {
        return 301 /contact;
    }

    location = /site-map.html {
        return 301 /site-map;
    }

    location = /test-all-pages.html {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location ^~ /admin/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri.html $uri/ /admin/login.html;
    }

    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~* \\.(?:css|js|mjs|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
