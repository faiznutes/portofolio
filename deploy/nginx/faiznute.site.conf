server {
    listen 80;
    listen [::]:80;
    server_name faiznute.site www.faiznute.site;

    root /var/www/faiznute.site/frontend;
    index index.html;

    access_log /var/log/nginx/faiznute.site.access.log;
    error_log /var/log/nginx/faiznute.site.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
